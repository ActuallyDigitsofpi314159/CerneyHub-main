<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>dumLLM</title>
    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --accent: #7c4dff; 
            --text: #c9d1d9; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        #header { 
            padding: 12px 16px; 
            background: var(--card); 
            border-bottom: 1px solid #30363d; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            flex-wrap: wrap; 
        }
        #header b { color: var(--accent); font-size: 18px; margin-right: 4px; }
        select, button { 
            background: #21262d; 
            color: white; 
            border: 1px solid #30363d; 
            padding: 7px 10px; 
            border-radius: 6px; 
            cursor: pointer;
            font-size: 13px;
        }
        select:hover, button:hover { border-color: var(--accent); }

        /* System prompt collapsible */
        #sys-wrap {
            background: var(--card);
            border-bottom: 1px solid #30363d;
        }
        #sys-toggle {
            width: 100%;
            background: none;
            border: none;
            border-radius: 0;
            color: #8b949e;
            font-size: 12px;
            padding: 7px 16px;
            text-align: left;
            cursor: pointer;
            letter-spacing: 0.05em;
        }
        #sys-toggle:hover { color: var(--text); background: rgba(255,255,255,0.03); }
        #sys-body {
            display: none;
            padding: 0 16px 12px;
        }
        #sys-body.open { display: block; }
        #sys-input {
            width: 100%;
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            padding: 10px 12px;
            resize: vertical;
            min-height: 70px;
            font-family: inherit;
            outline: none;
        }
        #sys-input:focus { border-color: var(--accent); }
        #sys-hint { font-size: 11px; color: #8b949e; margin-top: 5px; }

        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
        }
        .msg { 
            max-width: 85%; 
            padding: 14px 18px; 
            border-radius: 14px; 
            line-height: 1.65; 
            font-size: 15px; 
        }
        .user { 
            align-self: flex-end; 
            background: var(--accent); 
            color: white; 
            border-bottom-right-radius: 4px; 
        }
        .ai { 
            align-self: flex-start; 
            background: var(--card); 
            border: 1px solid #30363d; 
            border-bottom-left-radius: 4px; 
        }
        .ai-text { white-space: pre-wrap; word-break: break-word; }
        .code-block { 
            background: #010409; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            margin: 10px 0; 
            overflow: hidden; 
        }
        .code-header { 
            background: #21262d; 
            padding: 7px 14px; 
            font-size: 12px; 
            color: #8b949e; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .code-content { 
            padding: 14px; 
            font-family: 'Courier New', monospace; 
            font-size: 13px; 
            overflow-x: auto; 
            color: #c9d1d9; 
            white-space: pre; 
        }
        .copy-btn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 3px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 11px; 
        }
        #input-area { 
            padding: 16px; 
            background: var(--card); 
            border-top: 1px solid #30363d; 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }
        #user-input { 
            flex: 1; 
            background: #010409; 
            border: 1px solid #30363d; 
            color: white; 
            padding: 13px 18px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 15px;
            font-family: inherit;
        }
        #user-input:focus { border-color: var(--accent); }
        #send-btn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 0 24px;
            height: 46px;
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
        }
        #send-btn:disabled { background: #21262d; opacity: 0.6; cursor: wait; }
        #status { 
            font-size: 12px; 
            text-align: center; 
            color: #8b949e; 
            background: #010409; 
            padding: 8px; 
            border-top: 1px solid #30363d; 
        }
        .thinking { font-style: italic; color: #8b949e; }
        #clear-btn { color: #ff6b6b; border-color: rgba(255,107,107,0.3); }
        #clear-btn:hover { border-color: #ff6b6b; background: rgba(255,107,107,0.1); }

        /* empty state */
        #empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #8b949e;
            font-size: 14px;
            pointer-events: none;
            user-select: none;
        }
        #empty-state .big { font-size: 40px; }
    </style>
</head>
<body>

<div id="header">
    <b>dumLLM</b>
    <select id="model-select">
        <option value="gemma-2-2b-it-q4f16_1-MLC">Gemma 2 2B (Fast)</option>
        <option value="Phi-3-mini-4k-instruct-q4f16_1-MLC">Phi-3 Mini 4K</option>
        <option value="Llama-3.1-8B-Instruct-q4f16_1-MLC">Llama 3.1 8B</option>
        <option value="Mistral-7B-Instruct-v0.3-q4f16_1-MLC">Mistral 7B</option>
        <option value="Qwen2.5-3B-Instruct-q4f16_1-MLC">Qwen 2.5 3B</option>
        <option value="Qwen2.5-7B-Instruct-q4f16_1-MLC">Qwen 2.5 7B</option>
    </select>
    <button id="clear-btn" title="Clear chat">🗑 Clear</button>
</div>

<div id="sys-wrap">
    <button id="sys-toggle">▶ System Prompt</button>
    <div id="sys-body">
        <textarea id="sys-input" placeholder="e.g. You are a helpful assistant that always responds concisely."></textarea>
        <div id="sys-hint">Applied on next Initialize. Changing this mid-conversation doesn't affect already-loaded context.</div>
    </div>
</div>

<div id="chat">
    <div id="empty-state">
        <div class="big">🤖</div>
        <div>Pick a model and hit <strong>Initialize Engine</strong> to start.</div>
    </div>
</div>

<div id="status">Ready to initialize.</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="Initialize to start..." disabled autocomplete="off">
    <button id="send-btn">Initialize Engine</button>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    let engine = null;
    let isReady = false;
    // Full conversation history sent to the model each turn
    let chatHistory = [];

    const status   = document.getElementById("status");
    const sendBtn  = document.getElementById("send-btn");
    const chatDiv  = document.getElementById("chat");
    const userInput= document.getElementById("user-input");
    const modelSel = document.getElementById("model-select");
    const clearBtn = document.getElementById("clear-btn");
    const sysToggle= document.getElementById("sys-toggle");
    const sysBody  = document.getElementById("sys-body");
    const sysInput = document.getElementById("sys-input");
    const emptyState=document.getElementById("empty-state");

    // ---- System prompt toggle ----
    sysToggle.onclick = () => {
        sysBody.classList.toggle("open");
        sysToggle.textContent = sysBody.classList.contains("open")
            ? "▼ System Prompt"
            : "▶ System Prompt";
    };

    // ---- Clear chat ----
    clearBtn.onclick = () => {
        chatHistory = [];
        chatDiv.innerHTML = "";
        chatDiv.appendChild(emptyState);
        emptyState.style.display = "flex";
    };

    // ---- Model change ----
    modelSel.onchange = () => {
        resetToInitializeState();
        status.innerText = "Model changed — click Initialize Engine to load.";
    };

    // ---- Progress callback ----
    const initProgressCallback = (p) => {
        status.innerText = p.text || "Loading...";
    };

    // ---- Format markdown response ----
    function formatResponse(text) {
        const container = document.createElement("div");
        container.className = "ai-text";
        const parts = text.split(/(```[\s\S]*?```)/g);
        for (let part of parts) {
            if (part.startsWith("```")) {
                const match = part.match(/```(\w*)\n?([\s\S]*?)```/);
                if (match) {
                    const lang = match[1] || "text";
                    const code = match[2].trim();
                    const block = document.createElement("div");
                    block.className = "code-block";
                    const hdr = document.createElement("div");
                    hdr.className = "code-header";
                    hdr.innerHTML = `<span>${lang}</span><button class="copy-btn">Copy</button>`;
                    const content = document.createElement("div");
                    content.className = "code-content";
                    content.textContent = code;
                    hdr.querySelector(".copy-btn").onclick = () => {
                        navigator.clipboard.writeText(code);
                        const btn = hdr.querySelector(".copy-btn");
                        btn.textContent = "Copied!";
                        setTimeout(() => btn.textContent = "Copy", 1500);
                    };
                    block.appendChild(hdr);
                    block.appendChild(content);
                    container.appendChild(block);
                    continue;
                }
            }
            if (!part.trim()) continue;
            const lines = part.split('\n');
            let currentList = null, listType = null;
            for (let line of lines) {
                let t = line.trim();
                if (/^(-{3,}|_{3,}|\*{3,})$/.test(t)) {
                    const hr = document.createElement("hr");
                    hr.style.cssText = "border:none;border-top:1px solid #30363d;margin:20px 0;";
                    container.appendChild(hr); currentList = null; continue;
                }
                if (t.startsWith(">")) {
                    const q = document.createElement("blockquote");
                    q.style.cssText = "border-left:4px solid #7c4dff;padding-left:16px;margin:12px 0;color:#8b949e;";
                    q.innerHTML = t.replace(/^>\s?/, '');
                    container.appendChild(q); currentList = null; continue;
                }
                const hm = t.match(/^(#{1,6})\s+(.+)$/);
                if (hm) {
                    const h = document.createElement(`h${hm[1].length}`);
                    h.innerHTML = inlinemd(hm[2]);
                    h.style.margin = hm[1].length === 1 ? "24px 0 12px 0" : "20px 0 8px 0";
                    container.appendChild(h); currentList = null; continue;
                }
                const lm = t.match(/^(\s*)([-*+]|\d+\.)\s+(.+)$/);
                if (lm) {
                    const numbered = lm[2].endsWith('.');
                    if (!currentList || (numbered && listType !== "ol") || (!numbered && listType !== "ul")) {
                        const nl = document.createElement(numbered ? "ol" : "ul");
                        nl.style.cssText = "margin:10px 0 10px 20px;padding-left:10px;";
                        container.appendChild(nl);
                        currentList = nl; listType = numbered ? "ol" : "ul";
                    }
                    const li = document.createElement("li");
                    li.innerHTML = inlinemd(lm[3]);
                    currentList.appendChild(li); continue;
                }
                if (t) {
                    const p = document.createElement("p");
                    p.style.margin = "10px 0";
                    p.innerHTML = inlinemd(t);
                    container.appendChild(p); currentList = null;
                }
            }
        }
        return container;
    }

    function inlinemd(text) {
        return text
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*([^\*]+?)\*/g, '<em>$1</em>')
            .replace(/_(.+?)_/g, '<em>$1</em>')
            .replace(/`(.+?)`/g, '<code style="background:#21262d;padding:2px 6px;border-radius:4px;font-family:monospace;">$1</code>');
    }

    // ---- Reset ----
    function resetToInitializeState() {
        isReady = false;
        sendBtn.innerText = "Initialize Engine";
        sendBtn.disabled = false;
        userInput.disabled = true;
        userInput.placeholder = "Initialize to start...";
        if (engine) { try { engine.terminate(); } catch(e) {} engine = null; }
    }

    // ---- Init engine ----
    async function initWebLLM() {
        sendBtn.disabled = true;
        sendBtn.innerText = "Loading...";
        status.innerText = "Creating engine...";
        try {
            if (!navigator.gpu) throw new Error("WebGPU not supported in this browser");
            const modelId = modelSel.value;
            if (engine) { try { await engine.terminate(); } catch(e) {} }
            engine = new webllm.MLCEngine({ initProgressCallback });
            status.innerText = `Loading ${modelId}... (first load may take 30–90s)`;
            await engine.reload(modelId);
            isReady = true;
            sendBtn.innerText = "Send";
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.placeholder = "Ask me something...";
            userInput.focus();
            status.innerText = `✓ Ready — ${modelId}`;
        } catch (e) {
            console.error(e);
            status.innerText = "Error: " + e.message;
            sendBtn.innerText = "Try Again";
            sendBtn.disabled = false;
        }
    }

    // ---- Chat with history ----
    async function chat() {
        const prompt = userInput.value.trim();
        if (!prompt || !isReady) return;

        // Hide empty state
        emptyState.style.display = "none";

        // Add user bubble
        const uBox = document.createElement("div");
        uBox.className = "msg user";
        uBox.textContent = prompt;
        chatDiv.appendChild(uBox);

        // Add AI bubble placeholder
        const aBox = document.createElement("div");
        aBox.className = "msg ai";
        aBox.innerHTML = '<span class="thinking">thinking...</span>';
        chatDiv.appendChild(aBox);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        userInput.value = "";
        sendBtn.disabled = true;

        // Build messages array: optional system prompt + full history + new user message
        const messages = [];
        const sysPrompt = sysInput.value.trim();
        if (sysPrompt) messages.push({ role: "system", content: sysPrompt });
        messages.push(...chatHistory);
        messages.push({ role: "user", content: prompt });

        let fullText = "";
        try {
            const completion = await engine.chat.completions.create({
                messages,
                stream: true,
                temperature: 0.7
            });
            for await (const chunk of completion) {
                const delta = chunk.choices[0]?.delta?.content || "";
                if (delta) {
                    fullText += delta;
                    aBox.innerHTML = "";
                    aBox.appendChild(formatResponse(fullText));
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                }
            }
            // Save to history only after a successful response
            chatHistory.push({ role: "user", content: prompt });
            chatHistory.push({ role: "assistant", content: fullText });
        } catch (e) {
            aBox.textContent = "Error: " + e.message;
        }

        chatDiv.scrollTop = chatDiv.scrollHeight;
        sendBtn.disabled = false;
        userInput.focus();
    }

    // ---- Events ----
    sendBtn.onclick = () => {
        if (isReady) chat();
        else initWebLLM();
    };

    userInput.onkeydown = (e) => {
        if (e.key === "Enter" && isReady) { e.preventDefault(); chat(); }
    };

    resetToInitializeState();
</script>
</body>
</html>
